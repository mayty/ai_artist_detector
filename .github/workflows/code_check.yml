name: Code check

on: [push]

jobs:
  code-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Set up Python
        run: uv python install
      - name: Install the project
        run: uv sync --locked
      - name: Run checks
        run: uv run make -f .docker/dev/Makefile check
